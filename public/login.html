<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login • Sakura API</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="topbar">
<button class="hamburger" onclick="toggleMenu()" aria-label="Menú">
<span></span><span></span><span></span>
</button>
<div class="brand">Sakura API</div>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<nav class="sidemenu" id="sideMenu">
<div class="sidemenu-title">Categorías</div>
<a href="/" class="menu-link">Inicio</a>
<a href="/ejemplo" class="menu-link">Ejemplo</a>

<div class="sidemenu-title" style="margin-top:20px;">Cuenta</div>
<a href="/register" class="menu-link">Registro</a>
</nav>

<div class="container">

<h2>Iniciar sesión</h2>
<p class="subtitle">Entra con tu cuenta</p>

<div class="card">
<form id="loginForm">
<input type="text" id="username" placeholder="Usuario" required>
<input type="password" id="password" placeholder="Contraseña" required>
<!-- Captcha placeholder -->
<button type="submit">Entrar</button>
</form>
</div>

<p id="result"></p>

<p>¿No tienes cuenta? <a href="/register">Regístrate</a></p>

</div>

<div class="toast" id="toast">
Copiado al portapapeles
</div>

<script src="/js/app.js"></script>

</body>
</html>
