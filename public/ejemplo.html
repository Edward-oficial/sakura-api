<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ejemplo • Sakura API</title>

<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="topbar">
<button class="hamburger" onclick="toggleMenu()" aria-label="Menú">
<span></span><span></span><span></span>
</button>
<div class="brand">Sakura API</div>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<nav class="sidemenu" id="sideMenu">
<div class="sidemenu-title">Categorías</div>
<a href="/" class="menu-link">Inicio</a>
<a href="/ejemplo" class="menu-link active">Ejemplo</a>
<a href="/search" class="menu-link">Search</a>

<div class="sidemenu-title" style="margin-top:20px;">Cuenta</div>
<a href="/profile" class="menu-link">Perfil</a>
<a href="#" class="menu-link" onclick="logout()">Cerrar sesión</a>
</nav>

<div class="container">

<h2>Ejemplo</h2>
<p class="subtitle" style="margin-bottom:20px;text-align:left;">Endpoint de prueba</p>

<div class="card">

<div class="desc">
API KEY
</div>

<input
id="apiKeyInput"
placeholder="Sakura0000"
>

</div>

<div class="card">

<div class="method">GET</div>

<div class="path" data-endpoint="/ejemplo/ping?apikey=TU_API_KEY">/ejemplo/ping?apikey=TU_API_KEY</div>

<div class="desc">
Verifica que el servidor está vivo
</div>

<div class="buttons">

<button class="test" onclick="run('/ejemplo/ping')">
Probar
</button>

<button class="copy" onclick="copyEndpoint(this)">
Copiar Endpoint
</button>

</div>

</div>

<div class="result">

<pre id="json">
Aquí aparecerá el resultado...
</pre>

<button
class="copyJson"
onclick="copyJson()">
Copiar JSON
</button>

</div>

</div>

<div class="toast" id="toast">
Copiado al portapapeles
</div>

<script src="/js/app.js"></script>

</body>
</html>
