<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin • Sakura API</title>

<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

<style>

.userRow{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
padding:14px 0;
border-bottom:1px solid #cbb488;
flex-wrap:wrap;
}

.userRow:last-child{
border-bottom:none;
}

.userMeta{
font-size:13px;
color:#7c6a55;
}

.adminTag{
display:inline-block;
background:#c69a4a;
color:#1b1420;
font-size:11px;
font-weight:700;
padding:3px 8px;
border-radius:6px;
margin-left:8px;
}

</style>
</head>

<body>

<header class="topbar">
<button class="hamburger" onclick="toggleMenu()" aria-label="Menú">
<span></span><span></span><span></span>
</button>
<div class="brand">Sakura API</div>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<nav class="sidemenu" id="sideMenu">
<div class="sidemenu-title">Categorías</div>
<a href="/" class="menu-link">Inicio</a>
<a href="/ejemplo" class="menu-link">Ejemplo</a>
<a href="/search" class="menu-link">Search</a>

<div class="sidemenu-title" style="margin-top:20px;">Cuenta</div>
<a href="/profile" class="menu-link">Perfil</a>
<a href="/admin" class="menu-link active admin-only" style="display:none;">Admin</a>
<a href="#" class="menu-link" onclick="logout()">Cerrar sesión</a>
</nav>

<div class="container">

<h2>Panel de administración</h2>
<p class="subtitle" style="margin-bottom:20px;text-align:left;">Usuarios registrados</p>

<div class="card" id="usersCard">
<p class="empty">Cargando usuarios...</p>
</div>

<div class="result">
<pre id="json">
...
</pre>
</div>

</div>

<div class="toast" id="toast">
Copiado al portapapeles
</div>

<script src="/js/app.js"></script>
<script>

async function loadUsers(){

    const card = document.getElementById("usersCard");
    const json = document.getElementById("json");

    try{

        const res = await fetch('/admin/users');
        const data = await res.json();

        if(!data.status){
            card.innerHTML = '<p class="empty">' + (data.error || "No se pudo cargar") + '</p>';
            return;
        }

        if(!data.users.length){
            card.innerHTML = '<p class="empty">Todavía no hay usuarios registrados</p>';
            return;
        }

        card.innerHTML = data.users.map(function(u){

            const tag = u.is_admin ? '<span class="adminTag">ADMIN</span>' : '';
            const uso = u.unlimited ? "Ilimitado" : (u.requests_used + " / " + u.requests_limit);

            return `
                <div class="userRow">
                    <div>
                        <strong>${u.username}</strong>${tag}
                        <div class="userMeta">API Key: ${u.api_key} · Uso: ${uso}</div>
                    </div>
                    <button class="copy" style="flex:none;padding:8px 14px;" onclick="toggleAdmin('${u.username}', ${!u.is_admin})">
                        ${u.is_admin ? "Quitar admin" : "Dar admin"}
                    </button>
                </div>
            `;

        }).join("");

    }catch(err){
        card.innerHTML = '<p class="empty">Error: ' + err.message + '</p>';
    }

}

async function toggleAdmin(username, isAdmin){

    const json = document.getElementById("json");

    try{

        const res = await fetch('/admin/setAdmin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, isAdmin })
        });

        const data = await res.json();

        if(data.status){
            json.textContent = `${data.username} ahora ${data.isAdmin ? "ES" : "NO es"} admin`;
            loadUsers();
        }else{
            json.textContent = data.error || "No se pudo actualizar";
        }

    }catch(err){
        json.textContent = "Error: " + err.message;
    }

}

loadUsers();

</script>

</body>
</html>
