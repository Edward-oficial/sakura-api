<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil • Sakura API</title>

<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="topbar">
<button class="hamburger" onclick="toggleMenu()" aria-label="Menú">
<span></span><span></span><span></span>
</button>
<div class="brand">Sakura API</div>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<nav class="sidemenu" id="sideMenu">
<div class="sidemenu-title">Categorías</div>
<a href="/" class="menu-link">Inicio</a>
<a href="/ejemplo" class="menu-link">Ejemplo</a>
<a href="/search" class="menu-link">Search</a>

<div class="sidemenu-title" style="margin-top:20px;">Cuenta</div>
<a href="/profile" class="menu-link active">Perfil</a>
<a href="/admin" class="menu-link admin-only" style="display:none;">Admin</a>
<a href="#" class="menu-link" onclick="logout()">Cerrar sesión</a>
</nav>

<div class="container">

<h2>Perfil</h2>
<p class="subtitle" style="margin-bottom:20px;text-align:left;">Tu cuenta en Sakura API</p>

<div class="card" style="text-align:center;">

<img
id="avatarImg"
src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f338.svg"
alt="Foto de perfil"
style="width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid #c69a4a;background:#e7d8bf;margin-bottom:16px;"
>

<h3 id="usernameText" style="margin-bottom:4px;">Cargando...</h3>
<p class="desc" style="margin-bottom:18px;">
API Key: <span id="apiKeyText" style="font-family:'JetBrains Mono',monospace;"></span>
</p>

<p class="desc" style="margin-bottom:18px;">
Uso este mes: <span id="usageText"></span>
</p>

<input type="file" id="avatarInput" accept="image/*">

<div class="buttons" style="margin-top:12px;">
<button class="test" onclick="uploadAvatar()">
Cambiar foto
</button>
</div>

</div>

<div class="result">
<pre id="json">
...
</pre>
</div>

</div>

<div class="toast" id="toast">
Copiado al portapapeles
</div>

<script src="/js/app.js"></script>
<script>

async function loadProfile(){

    const json = document.getElementById("json");

    try{

        const res = await fetch('/profile/me');
        const data = await res.json();

        if(!data.status){
            json.textContent = data.error || "No se pudo cargar el perfil";
            return;
        }

        document.getElementById("avatarImg").src = data.avatarUrl;
        document.getElementById("usernameText").textContent = data.username;
        document.getElementById("apiKeyText").textContent = data.apiKey;
        document.getElementById("usageText").textContent = data.unlimited
            ? "Ilimitado"
            : `${data.requestsUsed} / ${data.requestsLimit}`;

        json.textContent = "Perfil cargado correctamente";

    }catch(err){
        json.textContent = "Error: " + err.message;
    }

}

async function uploadAvatar(){

    const input = document.getElementById("avatarInput");
    const json = document.getElementById("json");

    if(!input.files[0]){
        json.textContent = "Elige una foto de tu galería primero";
        return;
    }

    const formData = new FormData();
    formData.append("avatar", input.files[0]);

    json.textContent = "Subiendo foto...";

    try{

        const res = await fetch('/profile/avatar', {
            method: 'POST',
            body: formData
        });

        const data = await res.json();

        if(data.status){
            document.getElementById("avatarImg").src = data.avatarUrl;
            json.textContent = "Foto actualizada correctamente";
        }else{
            json.textContent = data.error || "No se pudo subir la foto";
        }

    }catch(err){
        json.textContent = "Error: " + err.message;
    }

}

loadProfile();

</script>

</body>
</html>
